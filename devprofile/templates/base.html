<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}GitHub Profile Toolkit{% endblock %}</title>

<meta name="description" content="Analyze GitHub profiles and generate professional README files instantly.">
<meta name="keywords" content="github profile analyzer, github readme generator, developer tools">
<meta name="robots" content="index, follow">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* GLOBAL */

body{
background:#0f172a;
color:white;
font-family:system-ui;
min-height:100vh;
overflow-x:hidden;
}

/* Background grid */

body::before{

content:"";

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background-image:
linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

background-size:40px 40px;

z-index:-1;

}


/* NAVBAR */

.navbar{

background:#020617;

border-bottom:1px solid rgba(255,255,255,0.05);

}

.navbar-brand{

font-size:20px;
letter-spacing:0.5px;

}

.navbar a{

position:relative;
transition:0.3s;

}

.navbar a::after{

content:"";
position:absolute;
left:0;
bottom:-3px;
width:0%;
height:2px;
background:#3b82f6;
transition:0.3s;

}

.navbar a:hover::after{

width:100%;

}


/* HERO */

.hero{

margin-top:100px;
text-align:center;

}


/* INPUT */

input{

background:#1e293b !important;
border:1px solid rgba(255,255,255,0.05) !important;
color:white !important;
transition:0.2s;

}

input:focus{

outline:none !important;
box-shadow:none !important;
border-color:#3b82f6 !important;

}


/* BUTTON */

button{

background:linear-gradient(90deg,#3b82f6,#6366f1);
border:none;
transition:0.3s;

}

button:hover{

transform:translateY(-1px);
box-shadow:0 4px 15px rgba(59,130,246,0.3);

}


/* CARD */

.card{

border-radius:12px;
background:rgba(30,41,59,0.8);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.05);
box-shadow:0 0 20px rgba(0,0,0,0.4);
transition:0.3s;

}

.card:hover{

transform:translateY(-6px);
box-shadow:0 10px 35px rgba(0,0,0,0.7);

}


/* DEV BADGES */

.dev-badge{

display:inline-flex;
align-items:center;
justify-content:center;

width:120px;
height:120px;

border-radius:50%;

background:linear-gradient(135deg,#3b82f6,#6366f1);

font-weight:bold;
text-align:center;

margin:10px;

box-shadow:0 0 20px rgba(59,130,246,0.4);

transition:0.3s;

}

.dev-badge:hover{

transform:scale(1.08);
box-shadow:0 0 35px rgba(59,130,246,0.7);

}


/* PAGE FADE */

.fade-page{

animation:fadePage 0.6s ease;

}

@keyframes fadePage{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

}


/* CONTAINER */

.container{

max-width:1100px;

}


/* LANGUAGE TABLE */

.language-table{

max-width:850px;
margin:auto;
margin-bottom:30px;

}

.language-row{

display:flex;
align-items:center;
margin-bottom:10px;
font-size:15px;

}

.lang-name{

width:140px;
font-weight:500;

}

.lang-dots{

flex:1;
border-bottom:1px dashed #374151;
margin:0 10px;

}

.lang-percent{

width:70px;
text-align:right;
color:#60a5fa;
font-weight:500;

}

.lang-repos{

width:90px;
text-align:right;
color:#9ca3af;
font-size:14px;

}


/* CHART */

.chart-container{

height:300px;

background:#020617;

padding:20px;

border-radius:12px;

box-shadow:0 0 20px rgba(0,0,0,0.5);

}

.chart-title{

text-align:center;

font-size:14px;

margin-bottom:10px;

color:#9ca3af;

}

.lang-progress{

flex:1;

height:10px;

background:#1e293b;

border-radius:10px;

margin:0 12px;

overflow:hidden;

}

.lang-fill{

height:100%;

background:linear-gradient(90deg,#3b82f6,#60a5fa);

transition:width 0.6s ease;

}

.lang-info{

width:110px;

text-align:right;

font-size:14px;

color:#9ca3af;

}



</style>

</head>

<body class="fade-page">

<nav class="navbar navbar-expand-lg navbar-dark px-4">

<a class="navbar-brand fw-bold" href="/">
⚡ GitHub Profile Toolkit
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-end" id="navMenu">

<a href="/analyzer/" class="btn btn-outline-light btn-sm me-2">
Analyzer
</a>

<a href="/readme/" class="btn btn-outline-light btn-sm">
README Generator
</a>

</div>

</nav>

{% block content %}
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>

</html>
