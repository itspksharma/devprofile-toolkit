{% extends "base.html" %}

{% block content %}

<style>

.editor-container{
display:flex;
gap:20px;
margin-top:20px;
}

.editor{
width:50%;
background:#0f172a;
padding:20px;
border-radius:10px;
}

.preview{
width:50%;
background:white;
padding:20px;
border-radius:10px;
}

/* EDITOR TEXTAREA */

textarea{
width:100%;
height:500px;
background:#020617;
color:#e2e8f0;
border:none;
padding:15px;
border-radius:8px;
font-family:monospace;
font-size:13px;
line-height:1.6;
overflow:auto;
}

/* PREVIEW BOX */

#previewBox{
height:500px;
overflow-y:auto;
border:1px solid #e5e7eb;
padding:15px;
border-radius:8px;
font-size:14px;
line-height:1.6;
color:#111;
background:#fafafa;
}

/* Markdown typography */

#previewBox h1{font-size:24px;margin-bottom:10px;}
#previewBox h2{font-size:20px;margin-bottom:8px;}
#previewBox h3{font-size:18px;margin-bottom:6px;}
#previewBox p{margin-bottom:10px;}
#previewBox code{
background:#f3f4f6;
padding:3px 6px;
border-radius:4px;
font-family:monospace;
}
#previewBox pre{
background:#111827;
color:#e5e7eb;
padding:12px;
border-radius:6px;
overflow:auto;
}

.top-actions{
margin-bottom:10px;
display:flex;
gap:10px;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:13px;
}

button:hover{
background:#1d4ed8;
}

/* GitHub style markdown */

#previewBox h1{font-size:26px;border-bottom:1px solid #e5e7eb;padding-bottom:6px;margin-top:20px;}
#previewBox h2{font-size:22px;border-bottom:1px solid #e5e7eb;padding-bottom:5px;margin-top:18px;}
#previewBox h3{font-size:18px;margin-top:15px;}

#previewBox p{
margin:10px 0;
}

#previewBox ul{
padding-left:20px;
}

#previewBox li{
margin:4px 0;
}

#previewBox code{
background:#f3f4f6;
padding:3px 6px;
border-radius:4px;
font-family:monospace;
font-size:13px;
}

#previewBox pre{
background:#111827;
color:#f9fafb;
padding:14px;
border-radius:8px;
overflow:auto;
font-size:13px;
line-height:1.6;
}

#previewBox code{
background:#e5e7eb;
color:#111827;
padding:3px 6px;
border-radius:4px;
font-size:12px;
}

</style>
<select id="themeSelector">

<option value="gruvbox">Gruvbox</option>
<option value="tokyonight">Tokyo Night</option>
<option value="radical">Radical</option>
<option value="dark">Dark</option>

</select>

<h2>README Editor</h2>

<div class="editor-container">

<!-- LEFT SIDE EDITOR -->

<div class="editor">

<h3 style="color:#e2e8f0;margin-bottom:10px;">
README Markdown Editor
</h3>

<div class="top-actions">

<button onclick="copyReadme()">Copy</button>

<button onclick="downloadReadme()">Download</button>

<a href="/readme/">
<button>Back</button>
</a>

</div>

<textarea id="readmeBox">{{ readme }}</textarea>

<div style="margin-top:10px;font-size:13px;color:#64748b;">
💡 Tip:
<ul>
<li>Edit text directly in editor</li>
<li>Preview auto update hota rahega</li>
<li>Markdown syntax use kar sakte ho</li>
<li>Links: [title](https://link.com)</li>
</ul>
</div>

</div>


<!-- RIGHT SIDE PREVIEW -->

<div class="preview">

<h3>Preview</h3>

<div id="previewBox"></div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>

const textarea = document.getElementById("readmeBox");
const preview = document.getElementById("previewBox");

function renderPreview(){

const markdown = textarea.value;

preview.innerHTML = marked.parse(markdown);

const links = preview.querySelectorAll("a");

links.forEach(link=>{
link.setAttribute("target","_blank");
link.setAttribute("rel","noopener noreferrer");
});

}

textarea.addEventListener("input", renderPreview);
textarea.addEventListener("keyup", renderPreview);

window.onload = renderPreview;

function copyReadme(){

textarea.select();
document.execCommand("copy");
alert("README copied!");

}

function downloadReadme(){

const text = document.getElementById("readmeBox").value;

const blob = new Blob([text], { type: "text/markdown" });

const link = document.createElement("a");

link.href = URL.createObjectURL(blob);

link.download = "README.md";

link.click();

}

document.getElementById("themeSelector").addEventListener("change", function(){

const theme = this.value;

let text = textarea.value;

text = text.replace(/theme=[a-zA-Z0-9_-]+/g, "theme=" + theme);

textarea.value = text;

renderPreview();

});

</script>

{% endblock %}
